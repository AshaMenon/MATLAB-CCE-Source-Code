# CCE Development Configuration File
#   This configuration works for development. It points to the CCE Dev sandbox, WACP. 
#   To use this configuration, type:
#       >> cce.dev.setCCERoot("dev")
[System]
    ServiceType = "AF"
    CCEUsername = "cceServer"
    CCEPassword = "REDACTED_WON'T_WORK"
    SchedulerFolderName = "CCE"
    LogFileMaxSize = 20
    LogFileBackupLimit = 20
[CalculationDB]
    ServerName = "Server"
    DBName = "DB"
[CoordinatorDB]
    ServerName = "Server"
    DBName = "DB"
[Configurator]
    # TestMode - Tell the configurator to load but not write anything but a log file
    TestMode = 0
    LogFile = "configurator.log"
    LogLevel = "Info"
[Coordinator]
    MaxCalculationLoad = 4
    Lifetime = 43200
    LifetimeOverrunPercentage = 10
    FrequencyLimit = 600
    LogFile = "coordinator.log"
    LogLevel = "Info"
[CalculationServer]
	HostName = "Host"
    Port = 9910
	AutoDeployFolder = "cceCalcServerDeploy"
    RequestTimeout = 5
