# This is the main deployment configuration file for CCE
#
# The format of this file is important, and slightly fragile.
# - Anything after "#" is a comment
# - Strings are delimited in "double-quotes".
# - Numbers are not delimited.
# - You cannot mix numbers and units (like 6 h) except in a string
#
# CCE Version MS04.2

[System]
    #ServiceType: ["AF"] The database service type. One of "AF", "CSV".
    ServiceType = "AF"

    #SchedulerFolderName ["CCE"]: The folder housing all CCE Scheduled Task in Windows Scheduler.
    SchedulerFolderName = "CCE Tasks"

    #CCEUsername ["cceServer"]: The user who runs Scheduled Tasks created by CCE.
    CCEUsername = "cceServer"

    #CCEPassword: An encrypted password for the <CCEUserName>. 
    #     Use cceBootstrap to generate the encrypted string.
    CCEPassword = "REDACTED_WON'T_WORK"

    #LogFileMaxSize: The maximum size for the coordinator and configurator log files, in MB.
    LogFileMaxSize = 20

    #LogFileBackupLimit: The number of backup files for each of the coordinator/configurators to keep before the oldest is purged.
    LogFileBackupLimit = 20

[CalculationDB]
    #ServerName: Hostname of the server hosting the Calculation database
    ServerName = "ons-opcdev.optinum.local"

    #DBName: Database name on the PI AF server hosting the Calculation database
    DBName = "CCEProd"

[CoordinatorDB]
    #ServerName: Hostname of the server hosting the Coordinator database
    ServerName = "ons-opcdev.optinum.local"

    #DBName: Database name on the PI AF server hosting the Coordinator database
    DBName = "CCEProd"

[Configurator]
    # TestMode - 1 tells the configurator to run but not write anything but a log file
    TestMode = 0

    #LogFile ["configurator.log"]: Name of the log file for the configurator.
    LogFile = "configurator.log"

    # LogLevel ["Info"]: Logging level for the configurator. Logging will occur for messages at or 
    #     below this level. Available levels are:
    #         "None" < "Error" < "Warning" < "Info" < "Debug" < "Trace" < "All"
    LogLevel = "Info"

[Coordinator]
    # MaxCalculationLoad [10]: Maximum number of calculations to allocate to a Coordinator
    MaxCalculationLoad = 10

    # Lifetime [43200]: How long (in seconds) a cyclic Coordinator runs before it shuts down and 
    #     restarts. Typical values are 12 hours (43200), 8 hours (28800) or one day (86400)
    Lifetime = 43200

    # LifetimeOverrunPercentage [10]: Fraction that a Coordinator is allowed to run before it 
    #     is forcibly shut down by Windows Scheduler.
    LifetimeOverrunPercentage = 10

    # FrequencyLimit [600]: Limit of ExecutionFrequency at which a coordinator becomes single-shot. 
    # For calculation sets with ExecutionFrequency above this limit, the Coordinator executes every 
    # ExecutionFrequency seconds.
    FrequencyLimit = 600

    #LogFile ["coordinator.log"]: Name of the log file for the coordinators.
    LogFile = "coordinator.log"
    # LogLevel ["Warning"]: Logging level for the coordinator. 
    LogLevel = "Warning"

[CalculationServer]
    # HostName: Name of CCE Calculation Server host (running MATLAB Production Server)
	HostName = "localhost"

    # Port: Port number for MATLAB Production Server running CCE Calculations
	Port = 9910

    # AutoDeployFolder: Name of Windows Share on Calculation Server host for auto-deploying
    #     calculation components.
	AutoDeployFolder = "CCE_Calc_Deploy"

    # RequestTimeout [5]: Number of seconds to set for the request timeout. If you see many timeouts
    #     in the Coordinator Logs, increase this value.
    RequestTimeout = 5